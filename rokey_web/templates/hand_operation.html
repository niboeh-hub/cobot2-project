<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROKEY - Hand Operation</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --ink: #1a1d23;
      --muted: #6b7280;
      --line: #e5e7eb;
      --hover: #f3f4f6;
      --idle: #6b7280;
      --idle-bg: #f3f4f6;
      --running: #4f46e5;
      --running-bg: #eef2ff;
      --success: #16a34a;
      --success-bg: #ecfdf5;
      --aborted: #b91c1c;
      --aborted-bg: #fef2f2;
      --start-on: #16a34a;
      --start-off: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      font-family: "Pretendard", "Noto Sans KR", "Malgun Gothic",
                    system-ui, sans-serif;
      color: var(--ink);
      background: var(--bg);
      overflow: hidden;
    }

    .page {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-btn {
      padding: 8px 14px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
    }
    .back-btn:hover { background: var(--hover); color: var(--ink); }
    .stop-btn {
      padding: 8px 14px;
      border: 1px solid var(--aborted);
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      color: var(--aborted);
      display: none;
    }
    .stop-btn:hover { background: var(--aborted-bg); }
    .logo {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.02em;
      margin-left: 8px;
    }
    .sub {
      font-size: 14px;
      color: var(--muted);
      font-weight: 600;
    }

    .big-timer {
      font-family: "Consolas", monospace;
      font-size: 38px;
      font-weight: 900;
      letter-spacing: 0.04em;
      color: var(--ink);
      padding: 4px 22px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      min-width: 180px;
      text-align: center;
    }
    .big-timer.active { color: var(--running); }

    .clock {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      font-family: "Consolas", monospace;
      font-size: 14px;
      font-weight: 700;
    }

    .body {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 380px;
      overflow: hidden;
    }

    .left {
      display: flex;
      flex-direction: column;
      padding: 20px 24px;
      gap: 16px;
      overflow: hidden;
    }

    .video-area {
      aspect-ratio: 1 / 1;
      height: 100%;
      max-height: calc(100vh - 200px);
      align-self: center;
      background: #0f1115;
      border-radius: 12px;
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      overflow: hidden;
      position: relative;
    }
    .video-area .placeholder {
      text-align: center;
      color: #9ca3af;
      padding: 40px;
    }
    .video-area .placeholder .icon {
      font-size: 48px;
      margin-bottom: 14px;
      opacity: 0.6;
    }
    .video-area .placeholder .msg {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #d1d5db;
    }
    .video-area .placeholder .hint {
      font-size: 13px;
      color: #9ca3af;
    }
    .video-area img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .start-area {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px 20px;
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 18px;
      align-items: center;
    }
    .start-btn {
      width: 78px;
      height: 78px;
      border-radius: 50%;
      border: 2px solid var(--line);
      background: var(--start-off);
      cursor: pointer;
      font-size: 28px;
      display: grid;
      place-items: center;
      transition: all 0.16s ease;
      color: var(--muted);
    }
    .start-btn:hover { background: var(--hover); }
    .start-btn.on {
      background: var(--start-on);
      border-color: var(--start-on);
      color: #fff;
    }
    .info-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .info-state {
      font-size: 14px;
      font-weight: 700;
      color: var(--muted);
    }
    .info-state.active { color: var(--start-on); }
    .info-hint {
      font-size: 12px;
      color: var(--muted);
    }
    .voice-status {
      font-size: 14px;
      color: var(--running);
      font-weight: 700;
      margin-top: 4px;
      display: none;
    }
    .voice-last {
      font-size: 13px;
      color: var(--ink);
      font-weight: 600;
      margin-top: 4px;
      padding: 6px 10px;
      background: var(--idle-bg);
      border-radius: 6px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .voice-last.hidden { display: none; }

    .right {
      border-left: 1px solid var(--line);
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-section {
      padding: 20px 24px;
      border-bottom: 1px solid var(--line);
    }
    .panel-section h3 {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .phase-badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }
    .phase-badge.idle    { background: var(--idle-bg);    color: var(--idle); }
    .phase-badge.running { background: var(--running-bg); color: var(--running); }
    .phase-badge.verifying { background: #fef3c7; color: #b45309; }
    .phase-badge.success { background: var(--success-bg); color: var(--success); }
    .phase-badge.aborted { background: var(--aborted-bg); color: var(--aborted); }

    .phase-message {
      margin-top: 10px;
      font-size: 14px;
      color: var(--ink);
      font-weight: 600;
    }

    .placeholder-block {
      padding: 16px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      background: var(--idle-bg);
      border-radius: 8px;
    }

    .recent {
      flex: 1;
      overflow-y: auto;
    }
    .recent-item {
      display: flex;
      gap: 10px;
      padding: 10px 24px;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }
    .recent-item .t {
      font-family: "Consolas", monospace;
      color: var(--muted);
      font-size: 12px;
      min-width: 70px;
    }
    .recent-item .e { flex: 1; }
    .recent-empty {
      padding: 28px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="page">

    <header class="header">
      <div class="header-left">
        <button class="back-btn" id="back-btn">← 메인</button>
        <button class="stop-btn" id="stop-btn">■ 임무 종료</button>
        <div class="logo">ROKEY</div>
        <div class="sub">/ Hand Mode</div>
      </div>
      <div class="big-timer" id="big-timer">00:00.0</div>
      <div class="clock">
        🕐 <span id="clock-time">--:--:--</span>
      </div>
    </header>

    <div class="body">

      <div class="left">
        <div class="video-area" id="video-area">
          <div class="placeholder" id="video-placeholder">
            <div class="icon">✋</div>
            <div class="msg">핸드 모드 대기 중</div>
            <div class="hint">시작 버튼을 누르고 손으로 로봇을 조종하세요</div>
          </div>
          <canvas id="hand-overlay-canvas"
                  style="position: absolute; top: 0; left: 0;
                         width: 100%; height: 100%;
                         pointer-events: none;
                         display: none;">
          </canvas>
        </div>

        <div class="start-area">
          <button class="start-btn" id="start-btn" type="button">▶</button>
          <div class="info-block">
            <div class="info-state" id="info-state">시작 대기</div>
            <div class="info-hint" id="info-hint">
              버튼을 눌러 핸드 모드를 시작하세요
            </div>
            <div class="voice-status" id="voice-status"></div>
            <div class="voice-last hidden" id="voice-last"></div>
          </div>
        </div>
      </div>

      <aside class="right">

        <div class="panel-section">
          <h3>현재 단계</h3>
          <span class="phase-badge idle" id="phase-badge">대기 중</span>
          <div class="phase-message" id="phase-message">대기 중</div>
        </div>

        <div class="panel-section">
          <h3>모드 정보</h3>
          <div class="placeholder-block">
            핸드 제스처로<br>로봇팔 직접 조종
          </div>
        </div>

        <div class="panel-section" style="padding-bottom: 8px;">
          <h3>최근 로봇 동작</h3>
        </div>
        <div class="recent" id="recent-events">
          <div class="recent-empty">아직 동작 없음</div>
        </div>

      </aside>

    </div>
  </div>

  {% include '_error_bar.html' %}

  <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>

  <script>
    function tickClock() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, '0');
      const mm = String(now.getMinutes()).padStart(2, '0');
      const ss = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock-time').textContent = `${hh}:${mm}:${ss}`;
    }
    tickClock();
    setInterval(tickClock, 1000);
  </script>

  <script>
    // ============================================================
    // ROS 연결 — 핸드 모드 노드 시작 신호 + stop 신호 함수
    // ============================================================
    const ROSBRIDGE_URL = 'ws://localhost:9090';
    const ros = new ROSLIB.Ros({ url: ROSBRIDGE_URL });

    const modeSelectTopic = new ROSLIB.Topic({
      ros: ros,
      name: '/mode_select',
      messageType: 'std_msgs/String'
    });

    ros.on('connection', () => {
      console.log('[ros] rosbridge 연결됨');
      modeSelectTopic.publish(new ROSLIB.Message({ data: 'mode2_jog' }));
      console.log('✋ [모드 제어] /mode_select -> mode2_jog 발행 완료');
    });
    ros.on('error', (e)  => console.error('[ros] 에러:', e));
    ros.on('close', ()   => console.warn('[ros] 연결 끊김'));

    // 페이지 나갈 때 stop 신호 발행하는 공통 함수
    window.publishModeStop = function() {
      try {
        modeSelectTopic.publish(new ROSLIB.Message({ data: 'stop' }));
        console.log('🛑 [모드 제어] /mode_select -> stop 발행');
      } catch (e) {
        console.error('stop 발행 실패:', e);
      }
    };
  </script>

  <script type="module">
    import { initializeApp, getApps } from
      "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, update, query, limitToLast } from
      "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      databaseURL: "https://rokey-d-2-1f6ab-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    const apps = getApps();
    const app = apps.length ? apps[0] : initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let timerStart = null;
    let timerInterval = null;
    const bigTimer = document.getElementById('big-timer');

    function startBigTimer() {
      if (timerInterval) return;
      timerStart = Date.now();
      bigTimer.classList.add('active');
      timerInterval = setInterval(() => {
        const elapsed = (Date.now() - timerStart) / 1000;
        const mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
        const ss = (elapsed % 60).toFixed(1).padStart(4, '0');
        bigTimer.textContent = `${mm}:${ss}`;
      }, 100);
    }
    function stopBigTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      bigTimer.classList.remove('active');
    }
    function resetBigTimer() {
      stopBigTimer();
      bigTimer.textContent = '00:00.0';
    }

    const VIDEO_URL_HAND = 'http://localhost:8080/stream?topic=/camera/camera/color/image_raw';
    const VIDEO_URL_VERIFYING = 'http://localhost:8080/stream?topic=/arrangement_result';

    function showVideo(phase) {
      const area = document.getElementById('video-area');
      const placeholder = document.getElementById('video-placeholder');
      const url = (phase === 'verifying') ? VIDEO_URL_VERIFYING : VIDEO_URL_HAND;
      const overlayCanvas = document.getElementById('hand-overlay-canvas');

      if (!url) {
        placeholder.innerHTML = `
          <div class="icon">📹</div>
          <div class="msg">영상 스트림 URL 미설정</div>
          <div class="hint">hand_operation.html의 VIDEO_URL_HAND를 채워주세요</div>
        `;
        return;
      }

      placeholder.style.display = 'none';
      let img = area.querySelector('img');
      if (!img) {
        img = document.createElement('img');
        area.appendChild(img);
      }
      if (img.src !== url) {
        img.src = url;
      }

      if (phase === 'verifying') {
        overlayCanvas.style.display = 'none';
      } else {
        overlayCanvas.style.display = 'block';
        const syncCanvas = () => {
          overlayCanvas.width = img.clientWidth;
          overlayCanvas.height = img.clientHeight;
        };
        img.addEventListener('load', syncCanvas);
        syncCanvas();
        window.addEventListener('resize', syncCanvas);
      }
    }
    function hideVideo() {
      const area = document.getElementById('video-area');
      const img = area.querySelector('img');
      if (img) img.remove();
      const overlayCanvas = document.getElementById('hand-overlay-canvas');
      overlayCanvas.style.display = 'none';
      const ctx = overlayCanvas.getContext('2d');
      ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

      const placeholder = document.getElementById('video-placeholder');
      placeholder.style.display = '';
      placeholder.innerHTML = `
        <div class="icon">✋</div>
        <div class="msg">핸드 모드 대기 중</div>
        <div class="hint">시작 버튼을 누르고 손으로 로봇을 조종하세요</div>
      `;
    }

    const stateRef = ref(db, 'operation_state');

    document.getElementById('start-btn').addEventListener('click', () => {
      const btn = document.getElementById('start-btn');
      const willTurnOn = !btn.classList.contains('on');
      update(stateRef, { hand_active: willTurnOn });
    });

    function applyStartUi(active) {
      const btn = document.getElementById('start-btn');
      const state = document.getElementById('info-state');
      const hint = document.getElementById('info-hint');
      if (active) {
        btn.classList.add('on');
        state.classList.add('active');
        state.textContent = '핸드 모드 활성';
        hint.textContent = '"헬로 로키 시작해" / "헬로 로키 검증 시작해"';
      } else {
        btn.classList.remove('on');
        state.classList.remove('active');
        state.textContent = '시작 대기';
        hint.textContent = '버튼을 눌러 핸드 모드를 시작하세요';
      }
    }

    function showResultOverlay(phase, message) {
      const existing = document.getElementById('result-overlay');
      if (existing) existing.remove();

      if (phase !== 'success' && phase !== 'aborted') return;

      const overlay = document.createElement('div');
      overlay.id = 'result-overlay';
      const isSuccess = phase === 'success';
      overlay.style.cssText = `
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.6); z-index: 9999;
        display: grid; place-items: center;
      `;
      const card = document.createElement('div');
      card.style.cssText = `
        background: #fff; border-radius: 16px;
        padding: 48px 64px; text-align: center; max-width: 600px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      `;
      const icon = isSuccess ? '✓' : '✗';
      const color = isSuccess ? 'var(--success)' : 'var(--aborted)';
      const label = isSuccess ? '임무 성공' : '임무 중단';
      card.innerHTML = `
        <div style="font-size: 80px; color: ${color}; font-weight: 900; margin-bottom: 16px;">${icon}</div>
        <div style="font-size: 28px; font-weight: 900; color: ${color}; margin-bottom: 12px;">${label}</div>
        <div style="font-size: 14px; color: var(--muted); margin-bottom: 28px; max-width: 480px;">${message || ''}</div>
        <div style="display: flex; gap: 12px; justify-content: center;">
          <button id="overlay-close" style="padding: 12px 24px; border: 1px solid var(--line); background: #fff; border-radius: 8px; cursor: pointer; font-weight: 700;">확인</button>
          <button id="overlay-logs" style="padding: 12px 24px; border: none; background: var(--running); color: #fff; border-radius: 8px; cursor: pointer; font-weight: 700;">로그 보기</button>
        </div>
      `;
      overlay.appendChild(card);
      document.body.appendChild(overlay);
      // 확인 버튼 — stop 신호도 같이 발행
      document.getElementById('overlay-close').addEventListener('click', async () => {
        overlay.remove();
        if (typeof window.publishModeStop === 'function') {
          window.publishModeStop();
        }
        try {
          await fetch('/api/abort_operation', { method: 'POST' });
        } catch (e) {
          console.error('abort 실패:', e);
        }
      });
      document.getElementById('overlay-logs').addEventListener('click', () => {
        location.href = '/logs';
      });
    }

    let prevPhase = null;

    onValue(stateRef, (snap) => {
      const s = snap.val() || {};
      console.log('[hand] state:', s);

      applyStartUi(!!s.hand_active);

      const phase = s.phase || 'idle';
      const badge = document.getElementById('phase-badge');
      badge.className = `phase-badge ${phase}`;
      const phaseLabel = {
        idle: '대기 중', running: '진행 중',
        verifying: '검사 중',
        success: '성공', aborted: '중단',
      }[phase] || phase;
      badge.textContent = phaseLabel;
      document.getElementById('phase-message').textContent =
        s.message || phaseLabel;

      document.getElementById('stop-btn').style.display =
        (phase === 'running' || phase === 'verifying') ? 'inline-block' : 'none';

      const isActive = (phase === 'running' || phase === 'verifying');
      const wasActive = (prevPhase === 'running' || prevPhase === 'verifying');

      if (isActive && !wasActive) startBigTimer();
      if (!isActive && wasActive) stopBigTimer();

      const shouldShowVideo = !!s.hand_active || isActive;
      if (shouldShowVideo) {
        showVideo(phase);
      } else {
        if (wasActive) {
          setTimeout(() => hideVideo(), 5000);
        } else {
          hideVideo();
        }
      }
      if (phase === 'idle' && prevPhase === null) resetBigTimer();

      prevPhase = phase;
      showResultOverlay(phase, s.message);

      const vs = document.getElementById('voice-status');
      if (s.voice_status) {
        vs.textContent = s.voice_status;
        vs.style.display = 'block';
        if (s.voice_status.includes('⚠') || s.voice_status.includes('인식하지 못')) {
          vs.style.color = 'var(--aborted)';
        } else {
          vs.style.color = 'var(--running)';
        }
      } else {
        vs.style.display = 'none';
      }

      const last = document.getElementById('voice-last');
      if (s.last_voice_text) {
        last.textContent = `"${s.last_voice_text}"`;
        last.classList.remove('hidden');
      } else {
        last.classList.add('hidden');
      }
    });

    const eventsQ = query(ref(db, 'robot_events'), limitToLast(5));
    onValue(eventsQ, (snap) => {
      const data = snap.val() || {};
      const items = Object.values(data);
      items.sort((a, b) => (b.timestamp || '').localeCompare(a.timestamp || ''));
      const box = document.getElementById('recent-events');
      if (items.length === 0) {
        box.innerHTML = '<div class="recent-empty">아직 동작 없음</div>';
        return;
      }
      box.innerHTML = items.map(it => {
        const t = (it.timestamp || '').split('T')[1] || '';
        const type = it.event_type || '?';
        const detail = it.detail
          ? Object.entries(it.detail).map(([k,v]) => `${k}=${JSON.stringify(v)}`).join(' ')
          : '';
        return `
          <div class="recent-item">
            <div class="t">${t}</div>
            <div class="e"><b>${type}</b> ${detail}</div>
          </div>
        `;
      }).join('');
    });

    // ===========================================================
    // 메인 가기 — stop 신호 발행 후 이동
    // ===========================================================
    document.getElementById('back-btn').addEventListener('click', async () => {
      if (prevPhase === 'running' || prevPhase === 'verifying') {
        if (!confirm('임무가 진행 중입니다. 정말 나가시겠습니까?')) return;
      }
      if (typeof window.publishModeStop === 'function') {
        window.publishModeStop();
      }
      try {
        await fetch('/api/abort_operation', { method: 'POST' });
      } catch (e) {
        console.error('abort 실패:', e);
      }
      // stop 신호 전달 시간 확보
      setTimeout(() => {
        location.href = '/';
      }, 300);
    });

    // ===========================================================
    // 임무 종료 버튼 — stop 신호 + abort
    // ===========================================================
    document.getElementById('stop-btn').addEventListener('click', async () => {
      if (!confirm('진행 중인 임무를 종료하시겠습니까?')) return;
      try {
        if (typeof window.publishModeStop === 'function') {
          window.publishModeStop();
        }
        await fetch('/api/abort_operation', { method: 'POST' });
      } catch (e) {
        console.error('임무 종료 실패:', e);
      }
    });

    // ============================================================
    // ROS 오버레이 (스켈레톤 캔버스 그리기)
    // ============================================================
    const HAND_CONNECTIONS = [
      [0,1],[1,2],[2,3],[3,4],
      [0,5],[5,6],[6,7],[7,8],
      [5,9],[9,10],[10,11],[11,12],
      [9,13],[13,14],[14,15],[15,16],
      [13,17],[17,18],[18,19],[19,20],
      [0,17]
    ];

    // ros 객체는 위쪽 첫 script에서 만든 거 재사용
    const overlayTopic = new ROSLIB.Topic({
      ros: window.ros || (function() {
        // 안전망 — 위쪽에서 못 잡았으면 같은 URL로 재연결
        return new ROSLIB.Ros({ url: 'ws://localhost:9090' });
      })(),
      name: '/hand_overlay_data',
      messageType: 'std_msgs/String'
    });

    overlayTopic.subscribe((msg) => {
      const canvas = document.getElementById('hand-overlay-canvas');
      if (canvas.style.display === 'none') return;

      let data;
      try { data = JSON.parse(msg.data); } catch (e) { return; }

      const W = canvas.width;
      const H = canvas.height;
      if (W === 0 || H === 0) return;

      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, W, H);

      if (data.deadzone) {
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(data.deadzone.cx * W, data.deadzone.cy * H,
                data.deadzone.r  * H, 0, 2 * Math.PI);
        ctx.stroke();
      }

      if (Array.isArray(data.landmarks) && data.landmarks.length === 21) {
        ctx.strokeStyle = 'lime';
        ctx.lineWidth = 2;
        for (const [a, b] of HAND_CONNECTIONS) {
          ctx.beginPath();
          ctx.moveTo(data.landmarks[a].x * W, data.landmarks[a].y * H);
          ctx.lineTo(data.landmarks[b].x * W, data.landmarks[b].y * H);
          ctx.stroke();
        }
        ctx.fillStyle = 'lime';
        for (const lm of data.landmarks) {
          ctx.beginPath();
          ctx.arc(lm.x * W, lm.y * H, 3, 0, 2 * Math.PI);
          ctx.fill();
        }
      }

      if (data.target) {
        const TARGET_X = data.target.x * W;
        const TARGET_Y = data.target.y * H;

        ctx.strokeStyle = 'rgb(255, 255, 0)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(TARGET_X - 5, TARGET_Y);
        ctx.lineTo(TARGET_X + 5, TARGET_Y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(TARGET_X, TARGET_Y - 5);
        ctx.lineTo(TARGET_X, TARGET_Y + 5);
        ctx.stroke();
        ctx.fillStyle = 'red';
        ctx.beginPath();
        ctx.arc(TARGET_X, TARGET_Y, 2, 0, 2 * Math.PI);
        ctx.fill();
      }

      const s = data.status;
      if (s) {
        if (s.calibrated) {
          ctx.fillStyle = 'lime';
          ctx.font = 'bold 18px sans-serif';
          ctx.fillText(
            `ACTIVE | Grip:${s.finger} | Vx:${s.vx.toFixed(1)} Vy:${s.vy.toFixed(1)} Vz:${s.vz.toFixed(1)}`,
            20, 40
          );
          ctx.fillStyle = 'orange';
          ctx.font = '14px sans-serif';
          ctx.fillText(
            `Base W: ${s.base_w.toFixed(3)} | Cur W: ${s.cur_w.toFixed(3)}`,
            20, 70
          );
        } else {
          ctx.fillStyle = 'red';
          ctx.font = 'bold 22px sans-serif';
          ctx.fillText('WAITING FOR WEB SIGNAL...', 20, 40);
        }

        if (s.z_limit) {
          ctx.fillStyle = 'red';
          ctx.font = 'bold 26px sans-serif';
          ctx.fillText('!!! Z-LIMIT REACHED !!!', W/2 - 200, H - 50);
        }
      }
    });
  </script>
</body>
</html>
